# ===============================
# SERVER
# ===============================
server.port=8080
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=clinic}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# TUZATILDI: ddl-auto=update production da xavfli.
# Production: validate yoki none — schemani Flyway/Liquibase boshqaradi.
# Lokal: application-local.properties da update qoldirilgan.
# ===============================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# JACKSON (JSON format)
# ===============================
spring.jackson.serialization.indent_output=true

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ===============================
# OAuth2
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${APP_URL:http://localhost:8080}/login/oauth2/code/google

# ===============================
# EMAIL / OTP
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===============================
# DATA INITIALIZER — TUZATILDI
# Parollar .env / environment variable dan o'qiladi, kodda yozilmaydi
# ===============================
app.init.superadmin-password=${INIT_SUPERADMIN_PASSWORD}
app.init.admin-password=${INIT_ADMIN_PASSWORD}
app.init.receptionist-password=${INIT_RECEPTIONIST_PASSWORD}
app.init.doctor-password=${INIT_DOCTOR_PASSWORD}
app.init.patient-password=${INIT_PATIENT_PASSWORD}

# TUZATILDI: hardcode "local" o'chirildi.
# Production'da bu hech qachon yozilmasligi kerak — aks holda
# application-local.properties (ddl-auto=update, test parollar) har doim ishga tushadi.
# Profil endi tashqi environment variable orqali tanlanadi:
#   lokal:      SPRING_PROFILES_ACTIVE=local
#   production: hech narsa bermaslik (yoki SPRING_PROFILES_ACTIVE=prod)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}